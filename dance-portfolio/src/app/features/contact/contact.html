<section class="py-20 px-6 max-w-6xl mx-auto">
  <div class="text-center mb-12">
    <h2 class="text-5xl font-bold mb-4">Fale Conosco</h2>
    <div class="w-24 h-1 bg-gradient-to-r from-orange-red to-electric-violet mx-auto"></div>
  </div>

  <div class="grid md:grid-cols-2 gap-12">
    <!-- Redes Sociais -->
<div class="surface-card p-8 rounded-3xl">
        <h3 class="text-2xl font-bold mb-6">Nos Encontre</h3>
        <div class="space-y-4">
          <a
            href="https://instagram.com/nexadt"
            target="_blank"
            class="flex items-center space-x-4 p-4 bg-slate-950/90 border border-white/10 rounded-3xl shadow-xl hover:bg-slate-900 transition"
          >
            <span class="text-4xl">📸</span>
            <div>
              <p class="font-semibold">Instagram</p>
              <p class="text-slate-400">@nexadt</p>
            </div>
          </a>

          <a
            href="https://tiktok.com/@nexadt"
            target="_blank"
            class="flex items-center space-x-4 p-4 bg-slate-950/90 border border-white/10 rounded-3xl shadow-xl hover:bg-slate-900 transition"
          >
            <span class="text-4xl">🎵</span>
            <div>
              <p class="font-semibold">TikTok</p>
              <p class="text-slate-400">@nexadt</p>
            </div>
          </a>

          <a
            href="https://www.youtube.com/@nexadanceteam"
            target="_blank"
            class="flex items-center space-x-4 p-4 bg-slate-950/90 border border-white/10 rounded-3xl shadow-xl hover:bg-slate-900 transition"
          >
            <span class="text-4xl">🎥</span>
            <div>
              <p class="font-semibold">YouTube</p>
              <p class="text-slate-400">@nexadanceteam</p>
            </div>
          </a>

          <a
            href="mailto:nexadanceteam@gmail.com"
            class="flex items-center space-x-4 p-4 bg-slate-950/90 border border-white/10 rounded-3xl shadow-xl hover:bg-slate-900 transition"
          >
            <span class="text-4xl">📧</span>
            <div>
              <p class="font-semibold">E-mail</p>
              <p class="text-slate-400">nexadanceteam@gmail.com</p>
          </div>
        </a>
      </div>
    </div>

    <!-- Formulário -->
    <div>
      <h3 class="text-2xl font-bold mb-6">Envie uma Mensagem</h3>
      <form (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Nome</label>
          <input
            [(ngModel)]="form.name"
            name="name"
            type="text"
            required
            class="w-full px-4 py-3 rounded-3xl focus:outline-none focus:ring-2 focus:ring-sky-400 form-input"
            placeholder="Seu nome"
          />
        </div>

        <div>
          <label class="block text-gray-700 font-semibold mb-2">E-mail</label>
          <input
            [(ngModel)]="form.email"
            name="email"
            type="email"
            required
            class="w-full px-4 py-3 rounded-3xl focus:outline-none focus:ring-2 focus:ring-sky-400 form-input"
            placeholder="seu@email.com"
          />
        </div>

        <div>
          <label class="block text-gray-700 font-semibold mb-2">Assunto</label>
          <input
            [(ngModel)]="form.subject"
            name="subject"
            type="text"
            required
            class="w-full px-4 py-3 rounded-3xl focus:outline-none focus:ring-2 focus:ring-sky-400 form-input"
            placeholder="Assunto da mensagem"
          />
        </div>

        <div>
          <label class="block text-gray-700 font-semibold mb-2">Mensagem</label>
          <textarea
            [(ngModel)]="form.message"
            name="message"
            required
            rows="5"
            class="w-full px-4 py-3 rounded-3xl focus:outline-none focus:ring-2 focus:ring-sky-400 form-input resize-none"
            placeholder="Sua mensagem aqui..."
          ></textarea>
        </div>

        <button
          type="submit"
          class="w-full bg-gradient-to-r from-orange-red to-vivid-pink text-white font-bold py-3 rounded-lg hover:shadow-lg transition"
        >
          Enviar Mensagem
        </button>
      </form>
    </div>
  </div>
</section>
